<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qvieck Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900">
    <div class="min-h-screen flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-zinc-900 text-white p-6">
            <h1 class="text-2xl font-bold mb-8 text-emerald-500">Qvieck Admin</h1>
            <nav class="space-y-4">
                <a href="#" onclick="showSection('stats')" class="block hover:text-emerald-400">Dashboard</a>
                <a href="#" onclick="showSection('users')" class="block hover:text-emerald-400">Users</a>
                <a href="#" onclick="showSection('messages')" class="block hover:text-emerald-400">Messages</a>
                <a href="#" onclick="showSection('logs')" class="block hover:text-emerald-400">System Logs</a>
                <hr class="border-zinc-800">
                <a href="/" class="block text-zinc-400 hover:text-white">Back to Messenger</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8 overflow-y-auto">
            <!-- Stats Section -->
            <section id="stats-section" class="space-y-6">
                <h2 class="text-3xl font-bold">Dashboard</h2>
                <div class="grid grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-zinc-200">
                        <p class="text-zinc-500 text-sm uppercase font-bold tracking-wider">Total Users</p>
                        <p id="stat-users" class="text-4xl font-bold mt-2">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-zinc-200">
                        <p class="text-zinc-500 text-sm uppercase font-bold tracking-wider">Messages Sent</p>
                        <p id="stat-messages" class="text-4xl font-bold mt-2">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-zinc-200">
                        <p class="text-zinc-500 text-sm uppercase font-bold tracking-wider">Active Rooms</p>
                        <p id="stat-rooms" class="text-4xl font-bold mt-2">0</p>
                    </div>
                </div>
            </section>

            <!-- Users Section -->
            <section id="users-section" class="hidden space-y-6">
                <h2 class="text-3xl font-bold">User Management</h2>
                <div class="bg-white rounded-2xl shadow-sm border border-zinc-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-zinc-100 border-b border-zinc-200">
                            <tr>
                                <th class="p-4">Username</th>
                                <th class="p-4">Email</th>
                                <th class="p-4">Role</th>
                                <th class="p-4">Status</th>
                                <th class="p-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Messages Section -->
            <section id="messages-section" class="hidden space-y-6">
                <h2 class="text-3xl font-bold">Message Moderation</h2>
                <div id="messages-list" class="space-y-4">
                    <!-- Messages injected here -->
                </div>
            </section>

            <!-- Logs Section -->
            <section id="logs-section" class="hidden space-y-6">
                <h2 class="text-3xl font-bold">System Logs</h2>
                <div class="bg-zinc-900 text-emerald-400 p-6 rounded-2xl font-mono text-sm overflow-x-auto">
                    <div id="logs-content">
                        <!-- Logs injected here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        async function fetchData(endpoint) {
            const res = await fetch(`/api/admin/${endpoint}`);
            if (res.status === 403) {
                alert('Access Denied');
                window.location.href = '/';
                return;
            }
            return res.json();
        }

        function showSection(section) {
            ['stats', 'users', 'messages', 'logs'].forEach(s => {
                document.getElementById(`${s}-section`).classList.add('hidden');
            });
            document.getElementById(`${section}-section`).classList.remove('hidden');
            
            if (section === 'stats') loadStats();
            if (section === 'users') loadUsers();
            if (section === 'messages') loadMessages();
            if (section === 'logs') loadLogs();
        }

        async function loadStats() {
            const stats = await fetchData('stats');
            if (stats) {
                document.getElementById('stat-users').innerText = stats.userCount;
                document.getElementById('stat-messages').innerText = stats.messageCount;
                document.getElementById('stat-rooms').innerText = stats.roomCount;
            }
        }

        async function loadUsers() {
            const users = await fetchData('users');
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = users.map(u => `
                <tr class="border-b border-zinc-100">
                    <td class="p-4">${u.username}</td>
                    <td class="p-4">${u.email}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-zinc-100'}">${u.role}</span></td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs ${u.status === 'banned' ? 'bg-red-100 text-red-700' : 'bg-emerald-100 text-emerald-700'}">${u.status}</span></td>
                    <td class="p-4 space-x-2">
                        <button onclick="userAction('${u.id}', 'ban')" class="text-red-500 hover:underline">Ban</button>
                        <button onclick="userAction('${u.id}', 'make-admin')" class="text-emerald-500 hover:underline">Make Admin</button>
                        <button onclick="deleteUser('${u.id}')" class="text-zinc-500 hover:underline">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadMessages() {
            const messages = await fetchData('messages');
            const list = document.getElementById('messages-list');
            list.innerHTML = messages.map(m => `
                <div class="bg-white p-4 rounded-xl border border-zinc-200 flex justify-between items-center">
                    <div>
                        <p class="text-sm font-bold">${m.sender?.username || 'Unknown'}</p>
                        <p class="text-zinc-600">${m.content}</p>
                        <p class="text-[10px] text-zinc-400">${new Date(m.createdAt).toLocaleString()}</p>
                    </div>
                    <button onclick="deleteMessage('${m._id}')" class="bg-red-50 text-red-500 px-3 py-1 rounded-lg hover:bg-red-100">Delete</button>
                </div>
            `).join('');
        }

        async function loadLogs() {
            const logs = await fetchData('logs');
            const content = document.getElementById('logs-content');
            content.innerHTML = logs.map(l => `
                <p>[${new Date(l.createdAt).toISOString()}] MSG_SENT: User ${l.sender?.username} sent message ID ${l._id}</p>
            `).join('');
        }

        async function userAction(id, action) {
            await fetch(`/api/admin/users/${id}/${action}`, { method: 'POST' });
            loadUsers();
        }

        async function deleteUser(id) {
            if (confirm('Are you sure?')) {
                await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
                loadUsers();
            }
        }

        async function deleteMessage(id) {
            await fetch(`/api/admin/messages/${id}`, { method: 'DELETE' });
            loadMessages();
        }

        // Initial load
        loadStats();
    </script>
</body>
</html>
